<!DOCTYPE html>

      max-width: 560px;
      text-align: center;
    }

      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.05;
    }

    p {
      margin: 0 0 16px;
      color: var(--muted);

      color: var(--accent);
      font-weight: 700;
    }
